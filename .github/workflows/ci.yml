name: CI/CD Pipeline

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

# Cancel in-progress runs for the same workflow
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  NEXT_PUBLIC_API_URL: https://molaraiche.app.n8n.cloud/webhook/ask

jobs:
  # ============================================
  # Quality Checks
  # ============================================
  quality:
    name: Code Quality
    runs-on: ubuntu-latest
    timeout-minutes: 10
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Run ESLint
        run: npm run lint

      - name: TypeScript type check
        run: npx tsc --noEmit

      - name: Check for console statements
        run: |
          echo "🔍 Checking for console statements..."
          if grep -r "console\.\(log\|warn\|error\)" app/ --exclude-dir=node_modules 2>/dev/null; then
            echo "⚠️  Warning: Console statements found (not blocking)"
            exit 0
          else
            echo "✅ No console statements found"
          fi

  # ============================================
  # Security Audit
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 5
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Run security audit
        run: |
          echo "🔒 Running security audit..."
          npm audit --audit-level=moderate || true
        continue-on-error: true

  # ============================================
  # Build & Test
  # ============================================
  build:
    name: Build Application
    runs-on: ubuntu-latest
    needs: [quality, security]
    timeout-minutes: 15
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --prefer-offline --no-audit

      - name: Build application
        run: |
          echo "🏗️  Building Next.js application..."
          npm run build
        env:
          NEXT_PUBLIC_API_URL: ${{ env.NEXT_PUBLIC_API_URL }}

      - name: Check build output
        run: |
          echo "📦 Build artifacts:"
          ls -lah .next/
          echo "✅ Build completed successfully"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        if: github.event_name == 'push' && github.ref == 'refs/heads/master'
        with:
          name: build-${{ github.sha }}
          path: |
            .next/
            !.next/cache/
          retention-days: 7
          compression-level: 9

  # ============================================
  # Deployment Status
  # ============================================
  deployment-status:
    name: Deployment Status
    runs-on: ubuntu-latest
    needs: [build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    timeout-minutes: 2
    
    steps:
      - name: Deployment notification
        run: |
          echo "🚀 Deployment Status"
          echo "===================="
          echo "✅ All checks passed"
          echo "📦 Build artifacts uploaded"
          echo "🌐 Vercel will auto-deploy via Git integration"
          echo ""
          echo "Production URL: https://comptable-ai.vercel.app"
          echo "Commit: ${{ github.sha }}"
          echo "Branch: ${{ github.ref_name }}"

  # ============================================
  # Summary
  # ============================================
  summary:
    name: CI Summary
    runs-on: ubuntu-latest
    needs: [quality, security, build]
    if: always()
    timeout-minutes: 2
    
    steps:
      - name: Check results
        run: |
          echo "📊 CI/CD Pipeline Summary"
          echo "========================="
          echo "Quality: ${{ needs.quality.result }}"
          echo "Security: ${{ needs.security.result }}"
          echo "Build: ${{ needs.build.result }}"
          echo ""
          
          if [ "${{ needs.quality.result }}" != "success" ] || [ "${{ needs.build.result }}" != "success" ]; then
            echo "❌ Pipeline failed"
            exit 1
          else
            echo "✅ All checks passed"
          fi
